<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Portfolio Watch|配置監控</title>
<meta name="description" content="投資組合配置偏離監控與再平衡工具">
<meta name="theme-color" content="#10151C">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 18 L4 10 M9 18 L9 6 M14 18 L14 12 M19 18 L19 8" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" fill="none"/></svg>
    <span class="brand-name">Portfolio<b>Watch</b></span>
  </div>
  <div class="topbar-controls">
    <select id="portfolioSwitcher" class="portfolio-switcher" aria-label="切換組合"></select>
    <button id="btnRefreshPrices" class="btn-icon" title="更新報價" aria-label="更新報價">
      <svg viewBox="0 0 24 24" width="18" height="18"><path d="M20 11a8 8 0 1 0-2.34 6.13M20 5v6h-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</header>

<div id="feedStatus" class="feed-status" hidden></div>

<main id="view" class="view"></main>

<nav class="tabbar" role="tablist">
  <button class="tab" data-view="overview" role="tab">總覽</button>
  <button class="tab" data-view="dashboard" role="tab">儀表板</button>
  <button class="tab" data-view="rebalance" role="tab">再平衡</button>
  <button class="tab" data-view="holdings" role="tab">持倉</button>
  <button class="tab" data-view="targets" role="tab">目標</button>
  <button class="tab" data-view="settings" role="tab">設定</button>
</nav>

<dialog id="modal" class="modal">
  <form method="dialog" id="modalForm" class="modal-form">
    <h3 id="modalTitle"></h3>
    <div id="modalBody" class="modal-body"></div>
    <div class="modal-actions">
      <button type="button" class="btn ghost" id="modalCancel">取消</button>
      <button type="submit" class="btn primary" id="modalOk">儲存</button>
    </div>
  </form>
</dialog>

<div id="toast" class="toast" hidden></div>

<script src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
